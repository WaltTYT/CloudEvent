spring:
  application:
    name: cloud-event-user
  config:
    import: nacos:localhost:8848
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/cloud_event_user
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: public
      config:
        server-addr: localhost:8848
        namespace: public
        file-extension: yml
        group: DEFAULT_GROUP
server:
  port: 8081

mybatis:
  configuration:
     map-underscore-to-camel-case: true
